<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Lesson 02 — Level 05</title>
  </head>
  <body>
    <h1>Level 05 — Select, Optgroup & Options</h1>
    <form>
      <select>
        <option>Choose a favorite</option>
        <optgroup label="Colors">
        <option>Red</option>
        <option>Green</option>
        <option>Blue</option>
        <option>Yellow</option>
        <option>Orange</option>
        <option>Purple</option>
        <option>Pink</option>
        <option>Brown</option>
        <option>Black</option>
        <option>White</option>
        <option>Grey</option>
        </optgroup>
        <optgroup label="Fruits">
        <option>Apple</option>
        <option>Banana</option>
        <option>Orange</option>
        <option>Grapes</option>
        <option>Strawberry</option>
        </optgroup>
        <optgroup label="Vegetables">
        <option>Carrot</option>
        <option>Broccoli</option>
        <option>Spinach</option>
        <option>Cabbage</option>
        <option>Lettuce</option>
        </optgroup>
          </select>
          <button type="submit">Submit</button>
      <!-- TODO: Add a select with options and at least one optgroup -->
    </form>
  </body>
</html>
