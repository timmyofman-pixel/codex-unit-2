  <body>
    <h1>Level 04 — Input Types</h1>
    <form>
      <label>Email</label>
      <input name="email" type="email"
      autocomplete="email" />
      <br />
      <label>Password:</label>
      <input type="password" />
      <br />
      <label>Age</label>
      <intput type="range" />
       <input name="age" type="number" min="0"
        max="100" /> 
      <br />
      <label>Phone</label>
      <input type="tel" />
      <br />
      <label>Volume</label>
      <input name="volume" type="range" min="0"
 max="100" />   
      <br />
      <label>File</label>
      <input type="file" />
      
      <button type="submit">Submit</button>
 <!-- TODO: Add inputs using types: email, tel, password, number, range, file -->
