<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Lesson 02 — Level 07</title>
  </head>
  <body>
    <h1>Ratings</h1>
    <form>
      
      <label for="goodRating">Good:</label>
      <input id="goodRating" type="checkbox" name="rating" value="good" />
      <br />

      
      <label for="badRating">Bad:</label>
      <input id="badRating" type="checkbox" name="rating" value="bad" />
      <br />

      <label>
        Neutral:
        <input type="checkbox" name="rating" value="neutral" />
      </label>
      <br />
      <label>
      <input type="submit" value="Submit" />
      </label>
      <br />
    </form>
  </body>
</html>
