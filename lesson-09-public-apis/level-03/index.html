<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Level 03 — Error handling</title>
    <script src="script.js" defer></script>
  </head>
  <body>
    <h1>Login (Error Handling)</h1>
    <form id="loginForm">
      <label>
        Email
        <input type="email" name="username" required />
      </label>
      <label>
        Password
        <input type="password" name="password" required />
      </label>
      <button type="submit">Login</button>
    </form>

    <output id="error" aria-live="polite"></output>
    <output id="success" aria-live="polite"></output>
  </body>
</html>
