<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Level 01 — Login API</title>
    <script src="script.js" defer></script>
  </head>
  <body>
    <h1>Login</h1>
    <form id="loginForm">

        Password

      <button type="submit">Login</button>
    </form>
  </body>
